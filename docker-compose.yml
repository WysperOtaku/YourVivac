# Stack completo de YourVivac en local (Mongo + Redis + API + workers + web).
# Uso:  docker compose up --build
#   web  → http://localhost:8080
#   api  → http://localhost:4000  (health: /health)
# Réplica del despliegue de Railway. Cordal (tiendas) vive en su propio repo.

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - yv-mongo:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      PORT: '4000'
      MONGODB_URI: mongodb://mongo:27017/yourvivac
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173
      # Local va por http → la cookie NO puede ser Secure (el navegador la descartaría).
      COOKIE_SECURE: 'false'
      COOKIE_SAMESITE: lax
      # Servicios externos (se toman del entorno del host / .env junto al compose).
      # Firebase Admin verifica el idToken de Google Sign-In.
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID:-}
      FIREBASE_CLIENT_EMAIL: ${FIREBASE_CLIENT_EMAIL:-}
      FIREBASE_PRIVATE_KEY: ${FIREBASE_PRIVATE_KEY:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
      STORE_SERVICE_URL: ${STORE_SERVICE_URL:-}
      STORE_SERVICE_API_KEY: ${STORE_SERVICE_API_KEY:-}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 15s
      timeout: 5s
      retries: 5

  workers:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: ['pnpm', '--filter', '@yourvivac/api', 'start:workers']
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongo:27017/yourvivac
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: dev-access-secret-change-me
      JWT_REFRESH_SECRET: dev-refresh-secret-change-me
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Ruta RELATIVA: el navegador del cliente (tú, un amigo por VPN, LAN…) llama a
        # su propio origen y este contenedor hace de proxy al API. Así no se hornea
        # ningún host inalcanzable para clientes remotos.
        VITE_API_URL: /api/v1
        # Se toman del entorno del host (o de un .env junto al compose).
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY:-}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN:-}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID:-}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID:-}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    environment:
      # Destino del proxy de /api y /socket.io dentro de la red de docker.
      API_PROXY_TARGET: http://api:4000
    ports:
      - '8080:8080'
    depends_on:
      - api

volumes:
  yv-mongo:
